<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b54"/>
      <stop offset="100%" stop-color="#ffb26b"/>
    </linearGradient>
    <clipPath id="c">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <g clip-path="url(#c)">
    <!-- tines -->
    <rect x="33" y="20" width="8" height="32" rx="4" fill="white"/>
    <rect x="44" y="20" width="8" height="32" rx="4" fill="white"/>
    <rect x="55" y="20" width="8" height="32" rx="4" fill="white"/>
    <!-- bridge -->
    <rect x="33" y="44" width="30" height="6" rx="3" fill="white"/>
    <!-- handle -->
    <rect x="42" y="49" width="12" height="32" rx="6" fill="white"/>
    <!-- leaf -->
    <ellipse cx="72" cy="30" rx="14" ry="7" fill="white" opacity="0.9" transform="rotate(-40 72 30)"/>
    <!-- vein -->
    <line x1="72" y1="30" x2="62" y2="20" stroke="#ffb26b" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
